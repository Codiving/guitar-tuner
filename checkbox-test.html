<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkbox Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 280px;
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    label.disabled { cursor: not-allowed; opacity: 0.4; }

    input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #1e293b;
      background: #1e293b;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      position: relative;
    }

    input[type="checkbox"]:checked {
      background: #6366f1;
      border-color: #6366f1;
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    input[type="checkbox"]:not(:disabled):hover {
      border-color: #6366f1;
    }

    input[type="checkbox"]:disabled { cursor: not-allowed; }

    .label-text {
      font-size: 15px;
      color: #f1f5f9;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge.enabled  { background: rgba(99,102,241,0.2); color: #818cf8; }
    .badge.disabled { background: rgba(100,116,139,0.2); color: #64748b; }

    .divider {
      border: none;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Checkbox</h2>

    <label>
      <input type="checkbox" />
      <span class="label-text">활성화</span>
      <span class="badge enabled">enabled</span>
    </label>

    <label>
      <input type="checkbox" checked />
      <span class="label-text">활성화 (체크됨)</span>
      <span class="badge enabled">enabled</span>
    </label>

    <hr class="divider" />

    <label class="disabled">
      <input type="checkbox" disabled />
      <span class="label-text">비활성화</span>
      <span class="badge disabled">disabled</span>
    </label>

    <label class="disabled">
      <input type="checkbox" checked disabled />
      <span class="label-text">비활성화 (체크됨)</span>
      <span class="badge disabled">disabled</span>
    </label>
  </div>
</body>
</html>
